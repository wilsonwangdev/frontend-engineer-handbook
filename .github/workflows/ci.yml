name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm format:check

      - name: Test (vitest)
        run: pnpm test

      - name: Build (Next.js + Turbopack)
        run: pnpm build

  # e2e job 暂时只在 workflow_dispatch（手动触发）时运行。
  # 原因：当前 e2e 用了"具体文字断言"（getByText("必学") 等），违反
  # SPEC-0005 §二（内容站测试策略），CI 上会因 strict mode 命中多个
  # 同字元素失败。已在 SPEC-0005 与 ROADMAP "下一步 > 第 7 章"明文
  # 规定动笔时一并重写为"快照 + 结构断言"风格。
  # 详情：journal/2026-05-20-e2e-proxy-on-ci.md（最末段记录归因升级）
  # 修复条件：第 7 章动笔时按 SPEC-0005 §二 重构 e2e，再删 if 一行。
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run Playwright tests
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
