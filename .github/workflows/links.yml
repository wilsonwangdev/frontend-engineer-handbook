name: Links

on:
  schedule:
    # 每周一 09:30 UTC（北京 17:30）。错开整点，避开高峰
    - cron: "30 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: links-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  link-checker:
    name: lychee 死链巡检
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --no-progress：CI 日志干净；其余配置在 lychee.toml
          # 范围：所有 Markdown / MDX 文档（不扫源码 import）
          args: >-
            --config lychee.toml
            './**/*.md'
            './**/*.mdx'
          fail: false
          jobSummary: true
          format: markdown
          output: lychee-report.md

      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 lychee 巡检：发现失效链接"
          content-filepath: ./lychee-report.md
          labels: |
            link-rot
            automated
